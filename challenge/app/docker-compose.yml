services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # train.csv and schema.json are baked into the image at build time.
      # Mount only if you want to swap data without rebuilding (development only).
      - ./backend/data:/app/data:ro
    networks:
      - challenge-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - challenge-net

networks:
  challenge-net:
    driver: bridge
